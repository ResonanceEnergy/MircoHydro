name: validate

on:
  push:
  pull_request:

jobs:
  validate_repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run repo validation
        run: |
          python tools/validate/validate_repo.py
